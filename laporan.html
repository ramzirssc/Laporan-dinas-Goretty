<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_self">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laporan Dinas Goretty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════════
       TEMA: Biru Muda – Abu — Nuansa Medis Bersih
    ══════════════════════════════════════════════ */

    :root {
      --bg:          #eef2f7;
      --bg2:         #e4eaf2;
      --surface:     #f8fafd;
      --surface2:    #edf1f7;
      --border:      #c8d4e3;
      --border-soft: #d8e2ee;

      --text:        #1a2233;
      --text-soft:   #4a5568;
      --muted:       #8a9ab5;

      --blue:        #3a6ea8;
      --blue-dk:     #274f7c;
      --blue-lt:     #ddeaf8;
      --blue-mid:    #a8c4e2;
      --blue-focus:  #4a90d9;

      --slate:       #5a6a82;
      --slate-lt:    #edf1f6;

      --ok:          #2e7d52;
      --ok-lt:       #e6f4ed;
      --warn:        #c0392b;
      --warn-lt:     #fdf0ee;
      --required:    #dc2626;

      --field-locked-bg:     #f0f3f8;
      --field-locked-text:   #8a9ab5;
      --field-locked-border: #d8e2ee;
      --field-active-bg:     #ffffff;
      --field-active-text:   #1a2233;
      --field-active-border: #3a6ea8;

      --serif: 'Lora', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;

      --radius-sm: 5px;
      --radius:    9px;
      --radius-lg: 14px;
      --shadow:    0 2px 8px rgba(30,60,120,.08), 0 1px 2px rgba(30,60,120,.05);
      --shadow-lg: 0 8px 28px rgba(30,60,120,.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 0% 0%, rgba(58,110,168,.07) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(90,106,130,.06) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .page { max-width: 1180px; margin: 0 auto; padding: 24px 20px 48px; }

    /* ── HEADER ──────────────────────────────────── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 22px;
      margin-bottom: 18px; box-shadow: var(--shadow);
      position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue-mid) 100%);
      border-radius: var(--radius-lg) 0 0 var(--radius-lg);
    }
    .header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .header h1 {
      font-family: var(--serif); font-size: 20px;
      font-weight: 600; font-style: italic;
      color: var(--blue-dk); white-space: nowrap;
    }
    .header h1 span {
      font-style: normal; font-weight: 400; font-size: 14px;
      color: var(--muted); margin-left: 2px;
    }

    /* ── NAVIGATOR ───────────────────────────────── */
    .nav-group { display: flex; align-items: center; gap: 6px; }
    .nav-group > span {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-right: 2px;
    }
    .btn-nav {
      width: 34px; height: 34px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; cursor: pointer; display: grid; place-items: center;
      color: var(--text-soft);
      transition: background .18s, border-color .18s, color .18s, transform .1s;
    }
    .btn-nav:hover:not(:disabled) {
      background: var(--blue-lt); border-color: var(--blue);
      color: var(--blue-dk); transform: scale(1.05);
    }
    .btn-nav:active:not(:disabled) { transform: scale(.96); }
    .btn-nav:disabled { opacity: .28; cursor: not-allowed; }

    #nomor {
      width: 76px; height: 34px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--sans); font-size: 15px; font-weight: 600;
      text-align: center; padding: 0 6px;
      background: var(--bg2); color: var(--text);
      transition: border-color .18s, background .18s, box-shadow .18s;
    }
    #nomor:focus {
      outline: none; border-color: var(--blue-focus);
      background: #fff; box-shadow: 0 0 0 3px var(--blue-lt);
    }
    #nomor:disabled { background: var(--surface2); color: var(--muted); }

    /* ── TOMBOL ───────────────────────────────────── */
    .btn {
      height: 36px; padding: 0 18px; border-radius: var(--radius-sm);
      font-family: var(--sans); font-size: 13px; font-weight: 600;
      letter-spacing: .02em; cursor: pointer; border: 1px solid transparent;
      transition: background .18s, color .18s, border-color .18s,
                  box-shadow .18s, transform .1s;
      display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .38; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--blue); color: #fff; border-color: var(--blue);
      box-shadow: 0 2px 6px rgba(58,110,168,.25);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--blue-dk); box-shadow: 0 4px 12px rgba(58,110,168,.32);
    }
    .btn-success {
      background: var(--ok); color: #fff; border-color: var(--ok);
      box-shadow: 0 2px 6px rgba(46,125,82,.2);
    }
    .btn-success:hover:not(:disabled) { background: #236040; }
    .btn-outline {
      background: var(--surface); color: var(--slate); border-color: var(--slate);
    }
    .btn-outline:hover:not(:disabled) {
      background: var(--slate-lt); box-shadow: 0 2px 8px rgba(90,106,130,.15);
    }
    .btn-ghost {
      background: var(--surface2); color: var(--text-soft); border-color: var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--bg2); border-color: #9aadca; }

    /* ── CARD ─────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); padding: 20px 24px;
      margin-bottom: 16px; box-shadow: var(--shadow);
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: var(--shadow-lg); }
    .card-title {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--serif); font-size: 13px;
      font-weight: 600; font-style: italic; color: var(--blue-dk);
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border-soft);
    }
    .card-title::before {
      content: ''; display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--blue-mid); flex-shrink: 0;
    }

    /* ── GRID FORM ────────────────────────────────── */
    .grid { display: grid; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field > label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .req { color: var(--required); font-size: 13px; line-height: 1; display: none; }

    /* ── INPUT / SELECT / TEXTAREA ────────────────── */
    input[type="text"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%; padding: 8px 12px;
      border: 1px solid var(--field-locked-border);
      border-radius: var(--radius-sm);
      font-family: var(--sans); font-size: 13.5px;
      color: var(--field-locked-text);
      background: var(--field-locked-bg);
      transition: border-color .18s, background .18s, box-shadow .18s, color .18s;
      -webkit-appearance: none; appearance: none;
    }
    input:not(:disabled), select:not(:disabled), textarea:not(:disabled) {
      background: var(--field-active-bg);
      color: var(--field-active-text);
      border-color: var(--field-active-border);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue-focus);
      box-shadow: 0 0 0 3px var(--blue-lt);
    }
    input:disabled, select:disabled, textarea:disabled {
      background: var(--field-locked-bg);
      color: var(--field-locked-text);
      cursor: default;
      border-color: var(--field-locked-border);
    }
    textarea { resize: vertical; line-height: 1.7; }

    /* ── CHECKBOX ALAT MEDIK — PILL ───────────────── */
    .checkbox-grid { display: flex; flex-wrap: wrap; gap: 8px 6px; }
    .check-item {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px 5px 9px;
      border: 1px solid var(--border); border-radius: 20px;
      background: var(--surface2); font-size: 12.5px; color: var(--text-soft);
      cursor: pointer; user-select: none; white-space: nowrap;
      transition: background .18s, border-color .18s, color .18s, box-shadow .15s;
    }
    .check-item:has(input:checked) {
      background: var(--blue-lt); border-color: var(--blue);
      color: var(--blue-dk); font-weight: 600;
      box-shadow: 0 0 0 2px var(--blue-mid);
    }
    .check-item:has(input:disabled) { opacity: .5; cursor: default; }
    .check-item input[type="checkbox"] {
      width: 14px; height: 14px; accent-color: var(--blue);
      cursor: pointer; flex-shrink: 0; margin: 0;
    }
    .check-item input:disabled { cursor: not-allowed; }

    /* ── LOADING ──────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(238,242,247,.78);
      display: none; align-items: center; justify-content: center;
      z-index: 9000; backdrop-filter: blur(3px);
    }
    #loading-overlay.show { display: flex; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--blue-mid); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .8s cubic-bezier(.5,.1,.5,.9) infinite;
    }
    .spinner-label { font-size: 13px; color: var(--text-soft); letter-spacing: .04em; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 28px; right: 28px;
      display: flex; flex-direction: column; gap: 10px; z-index: 9999;
    }
    .toast {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; border-radius: var(--radius); font-size: 13.5px;
      min-width: 270px; max-width: 420px; box-shadow: var(--shadow-lg);
      animation: slideUp .28s cubic-bezier(.22,.68,0,1.2);
      border-left: 4px solid transparent;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .toast.success { background: var(--ok-lt); color: #1e5c38; border-color: var(--ok); }
    .toast.error   { background: var(--warn-lt); color: #8b1a12; border-color: var(--warn); }
    .toast-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .toast-body { flex: 1; line-height: 1.5; }
    .toast-close {
      margin-left: auto; background: none; border: none;
      color: inherit; font-size: 17px; cursor: pointer; opacity: .6;
    }
    .toast-close:hover { opacity: 1; }

    /* ── ACTION BAR ───────────────────────────────── */
    .action-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg); box-shadow: var(--shadow);
    }
    .action-bar-hint {
      margin-left: auto; font-size: 12px;
      color: var(--muted); font-style: italic;
    }

    @media (max-width: 768px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div id="loading-overlay">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <span class="spinner-label">Memuat data…</span>
  </div>
</div>
<div id="toast-container"></div>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>Laporan Dinas <span>/ Ruang Goretty</span></h1>
    </div>
    <div class="header-left" style="gap:10px">
      <div class="nav-group">
        <span>No.</span>
        <button class="btn-nav" id="btn-prev" onclick="navigasi(-1)" title="Sebelumnya">&#8592;</button>
        <input type="number" id="nomor" min="1" placeholder="—">
        <button class="btn-nav" id="btn-next" onclick="navigasi(+1)" title="Berikutnya">&#8594;</button>
        <button class="btn btn-ghost" id="nmr" style="height:34px;padding:0 14px">Cari</button>
      </div>
      <button class="btn btn-primary" id="tambahdata">+ Laporan Baru</button>
    </div>
  </div>

  <!-- SEKSI 1: WAKTU & PETUGAS -->
  <div class="card">
    <div class="card-title">Waktu &amp; Petugas</div>
    <div class="grid grid-4">
      <div class="field">
        <label>Tanggal Dinas <span class="req">*</span></label>
        <input type="date" id="tanggal" disabled>
      </div>
      <div class="field">
        <label>Shift <span class="req">*</span></label>
        <select id="dinas" disabled>
          <option hidden disabled selected value="">Pilih shift</option>
          <option>Pagi</option><option>Sore</option><option>Malam</option>
        </select>
      </div>
      <div class="field">
        <label>Perawat PJ <span class="req">*</span></label>
        <select id="pj" disabled>
          <option hidden disabled selected value="">Pilih PJ</option>
          <?!=opsiperawat?>
        </select>
      </div>
      <div class="field">
        <label>Perawat PP <span class="req">*</span></label>
        <select id="pp" disabled>
          <option hidden disabled selected value="">Pilih PP</option>
          <?!=opsiperawat?>
        </select>
      </div>
    </div>
  </div>

  <!-- SEKSI 2: DATA PASIEN -->
  <div class="card">
    <div class="card-title">Data Pasien</div>
    <div class="grid grid-4">
      <div class="field" style="grid-column: span 2">
        <label>Nama Pasien <span class="req">*</span></label>
        <input type="text" id="namahidden" placeholder="Nama pasien" disabled>
        <select id="pasien" hidden disabled>
          <option hidden disabled selected value="">Pilih pasien</option>
          <?!=opsipasien?>
        </select>
      </div>
      <div class="field">
        <label>Umur</label>
        <input type="text" id="umur" placeholder="—" disabled>
      </div>
      <div class="field">
        <label>Hari Ke-</label>
        <input type="text" id="harike" placeholder="—" disabled maxlength="3">
      </div>
      <div class="field">
        <label>Agama</label>
        <input type="text" id="agama" placeholder="—" disabled>
      </div>
      <div class="field">
        <label>Jaminan</label>
        <input type="text" id="jaminan" placeholder="—" disabled>
      </div>
      <div class="field" style="grid-column: span 2">
        <label>DPJP</label>
        <input type="text" id="dpjp" placeholder="—" disabled>
      </div>
      <div class="field" style="grid-column: span 2">
        <label>Konsulen Lainnya</label>
        <input type="text" id="dpjplain" placeholder="—" disabled>
      </div>
    </div>
  </div>

  <!-- SEKSI 3: ALAT MEDIK (urut abjad) -->
  <div class="card">
    <div class="card-title">Alat Medik yang Digunakan</div>
    <div class="checkbox-grid" id="checkbox-group">
      <?!= buatcheckbox([
        'CPAP','CVC',
        'Facemask','HFNC','ICON',
        'Kateter','Nasalkanul','NIV',
        'PICC','Umbicath','Ventilator'
      ]) ?>
    </div>
  </div>

  <!-- SEKSI 4: DIAGNOSIS -->
  <div class="card">
    <div class="card-title">Diagnosis</div>
    <textarea id="diagnosis" rows="5" placeholder="Ketik diagnosis di sini." disabled></textarea>
  </div>

  <!-- SEKSI 5: ISI LAPORAN -->
  <div class="card">
    <div class="card-title">Isi Laporan</div>
    <textarea id="laporan" rows="22" placeholder="Ketik isi laporan di sini." disabled></textarea>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <button class="btn btn-outline" id="update">&#9998;&nbsp; Perbarui Laporan</button>
    <button class="btn btn-success" id="simpan" hidden>&#10003;&nbsp; Simpan Laporan</button>
    <span class="action-bar-hint" id="action-hint">Mode lihat — klik Perbarui untuk mengedit</span>
  </div>

</div><!-- /page -->

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
var totalBaris      = 0;
var modeEdit        = false;
var namaPasienCache = "";


// ── UTILITAS ────────────────────────────────────
function loading(tampil) {
  document.getElementById("loading-overlay").classList.toggle("show", tampil);
}

function toast(pesan, jenis) {
  var container = document.getElementById("toast-container");
  // Cegah toast duplikat
  var existing = container.querySelectorAll(".toast-body");
  for (var i = 0; i < existing.length; i++) {
    if (existing[i].textContent === pesan) return;
  }
  var el = document.createElement("div");
  el.className = "toast " + (jenis || "success");
  var ikon = (jenis === "error") ? "⚠" : "✓";
  el.innerHTML = '<span class="toast-icon">' + ikon + '</span>'
               + '<span class="toast-body">' + pesan + '</span>'
               + '<button class="toast-close" onclick="this.parentElement.remove()">&#x2715;</button>';
  container.appendChild(el);
  setTimeout(function() { if (el.parentElement) el.remove(); }, 4500);
}

function errHandler(err) {
  loading(false);
  toast("Terjadi kesalahan: " + ((err && err.message) ? err.message : err), "error");
}

function setHint(teks) {
  var el = document.getElementById("action-hint");
  if (el) el.textContent = teks;
}

function tandaWajib(tampil) {
  document.querySelectorAll(".req").forEach(function(el) {
    el.style.display = tampil ? "inline" : "none";
  });
}

function updateNav(nomorSaat) {
  document.getElementById("btn-prev").disabled = (nomorSaat <= 1);
  document.getElementById("btn-next").disabled = (nomorSaat >= totalBaris);
}


// ── INIT ─────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function() {
  tandaWajib(false);

  document.getElementById("nmr").addEventListener("click", carinomor);
  document.getElementById("tambahdata").addEventListener("click", tambahdata);
  document.getElementById("simpan").addEventListener("click", simpan);
  document.getElementById("update").addEventListener("click", modePerbarui);

  document.getElementById("nomor").addEventListener("keydown", function(e) {
    if (e.key === "Enter")      { e.preventDefault(); carinomor();  return; }
    if (e.key === "ArrowRight") { e.preventDefault(); navigasi(+1); return; }
    if (e.key === "ArrowLeft")  { e.preventDefault(); navigasi(-1); return; }
    if (e.key === "ArrowUp")    { e.preventDefault(); navigasi(+1); return; }
    if (e.key === "ArrowDown")  { e.preventDefault(); navigasi(-1); return; }
  });

  // SATU panggilan ke server saat load (menggantikan dua panggilan lama)
  loading(true);
  google.script.run
    .withSuccessHandler(function(data) {
      var obj = JSON.parse(data);
      totalBaris = obj.total;
      renderData(obj.baris);
      updateNav(totalBaris);
      loading(false);
    })
    .withFailureHandler(errHandler)
    .getInitialData();
});


// ── NAVIGASI ◄ ► ────────────────────────────────
function navigasi(arah) {
  if (modeEdit) return;
  var nomorSaat   = parseInt(document.getElementById("nomor").value) || totalBaris;
  var targetNomor = nomorSaat + arah;

  if (targetNomor < 1) {
    toast("Sudah berada di nomor laporan pertama.", "error");
    updateNav(nomorSaat);
    return;
  }
  if (targetNomor > totalBaris) {
    toast("Sudah tiba di nomor laporan terakhir (" + totalBaris + ").", "error");
    updateNav(nomorSaat);
    return;
  }

  kunciMode();
  loading(true);
  google.script.run
    .withSuccessHandler(function(stringify) {
      renderData(JSON.parse(stringify));
      updateNav(targetNomor);
      loading(false);
    })
    .withFailureHandler(errHandler)
    .caridata(targetNomor);
}


// ── CARI NOMOR MANUAL ───────────────────────────
function carinomor() {
  var cari = parseInt(document.getElementById("nomor").value);
  if (!cari || cari < 1) return;
  if (cari > totalBaris) {
    toast("Nomor " + cari + " belum ada. Data terakhir: " + totalBaris, "error");
    return;
  }
  kunciMode();
  loading(true);
  google.script.run
    .withSuccessHandler(function(stringify) {
      renderData(JSON.parse(stringify));
      updateNav(cari);
      loading(false);
    })
    .withFailureHandler(errHandler)
    .caridata(cari);
}


// ── TAMBAH LAPORAN BARU ─────────────────────────
function tambahdata() {
  clearForm();
  namaPasienCache = "";

  document.getElementById("nomor").value     = totalBaris + 1;
  document.getElementById("pasien").hidden   = false;
  document.getElementById("pasien").disabled = false;
  document.getElementById("namahidden").hidden = true;

  enableFields(true, true);
  document.getElementById("nomor").disabled = true;

  document.getElementById("pasien").addEventListener("change", ambilDataPasien);

  document.getElementById("simpan").hidden = false;
  document.getElementById("update").hidden = true;
  tandaWajib(true);
  setHint("Mode input baru — isi data lalu klik Simpan");
  modeEdit = true;
}


// ── MODE PERBARUI ───────────────────────────────
function modePerbarui() {
  // Kunci nomor, tanggal, dinas, pj, pp — hanya diagnosis, laporan, alat medik yang bisa diubah
  ["nomor","tanggal","dinas","pj","pp"].forEach(function(id) {
    document.getElementById(id).disabled = true;
  });
  document.getElementById("diagnosis").disabled = false;
  document.getElementById("laporan").disabled   = false;
  enableAlatMedik(true);

  document.getElementById("simpan").hidden = false;
  document.getElementById("update").hidden = true;
  tandaWajib(false);
  setHint("Mode edit — ubah data lalu klik Simpan");
  modeEdit = true;
}


// ── SIMPAN ──────────────────────────────────────
function simpan() {
  var ui = kumpulkanData();
  if (!validasi(ui)) return;

  namaPasienCache = ui.pasien;

  loading(true);
  google.script.run
    .withSuccessHandler(function() {
      if (ui.nomor > totalBaris) totalBaris = ui.nomor;
      kunciMode();
      if (namaPasienCache) {
        document.getElementById("namahidden").value = namaPasienCache;
      }
      updateNav(ui.nomor);
      toast("Data berhasil disimpan.", "success");
      loading(false);
    })
    .withFailureHandler(errHandler)
    .simpandisheet(ui);
}


// ── AMBIL DATA PASIEN (dari dropdown) ───────────
function ambilDataPasien() {
  var nama = document.getElementById("pasien").value;
  if (!nama) return;
  google.script.run
    .withSuccessHandler(function(hasil) {
      var p = JSON.parse(hasil);
      if (!p) return;
      document.getElementById("umur").value     = p[14] || "";
      document.getElementById("harike").value   = p[15] || "";
      document.getElementById("agama").value    = p[6]  || "";
      document.getElementById("jaminan").value  = p[8]  || "";
      document.getElementById("dpjp").value     = p[12] || "";
      document.getElementById("dpjplain").value = p[13] || "";
    })
    .withFailureHandler(errHandler)
    .umuragamajaminan(nama);
}


// ── RENDER DATA KE FORM ─────────────────────────
function renderData(baris) {
  var r = (Array.isArray(baris) && Array.isArray(baris[0])) ? baris[0] : baris;

  var namaPasien  = r[4] || "";
  namaPasienCache = namaPasien;

  document.getElementById("nomor").value      = r[0]  || "";
  document.getElementById("dinas").value      = r[2]  || "";
  document.getElementById("pj").value         = r[3]  || "";
  document.getElementById("namahidden").value = namaPasien;
  document.getElementById("pasien").value     = namaPasien;
  document.getElementById("pp").value         = r[5]  || "";
  document.getElementById("diagnosis").value  = r[6]  || "";
  document.getElementById("laporan").value    = r[7]  || "";
  document.getElementById("agama").value      = r[10] || "";
  document.getElementById("jaminan").value    = r[11] || "";
  document.getElementById("dpjp").value       = r[12] || "";
  document.getElementById("dpjplain").value   = r[13] || "";
  document.getElementById("umur").value       = r[14] || "";
  document.getElementById("harike").value     = r[15] || "";

  // Format tanggal
  if (r[1]) {
    var d   = new Date(r[1]);
    var tgl = ('0' + d.getDate()).slice(-2);
    var bln = ('0' + (d.getMonth() + 1)).slice(-2);
    document.getElementById("tanggal").value = d.getFullYear() + "-" + bln + "-" + tgl;
  } else {
    document.getElementById("tanggal").value = "";
  }

  // Checkbox alat medik
  document.querySelectorAll(".multi").forEach(function(cb) { cb.checked = false; });
  if (r[8] && r[8].length > 0) {
    r[8].split(";").forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.checked = true;
    });
  }

  kunciMode();
}


// ── KUNCI MODE (view only) ──────────────────────
function kunciMode() {
  enableFields(false, false);
  document.getElementById("pasien").hidden     = true;
  document.getElementById("namahidden").hidden = false;
  if (namaPasienCache && !document.getElementById("namahidden").value) {
    document.getElementById("namahidden").value = namaPasienCache;
  }
  document.getElementById("simpan").hidden  = true;
  document.getElementById("update").hidden  = false;
  document.getElementById("nomor").disabled = false;
  document.getElementById("nmr").disabled   = false;
  tandaWajib(false);
  setHint("Mode lihat — klik Perbarui untuk mengedit");
  modeEdit = false;
}


// ── ENABLE / DISABLE FIELD ──────────────────────
function enableFields(aktif, termasukPasien) {
  var dis = !aktif;
  ["tanggal","dinas","pj","pp","diagnosis","laporan"].forEach(function(id) {
    document.getElementById(id).disabled = dis;
  });
  if (termasukPasien) {
    document.getElementById("pasien").disabled = dis;
  }
  enableAlatMedik(aktif);
}

function enableAlatMedik(aktif) {
  document.querySelectorAll(".multi").forEach(function(cb) { cb.disabled = !aktif; });
}


// ── KUMPULKAN DATA ──────────────────────────────
function kumpulkanData() {
  var ui = {};
  var pakai_dropdown = !document.getElementById("pasien").hidden;
  ui.pasien = pakai_dropdown
    ? document.getElementById("pasien").value
    : (document.getElementById("namahidden").value || namaPasienCache);

  ui.nomor     = parseInt(document.getElementById("nomor").value);
  ui.tanggal   = document.getElementById("tanggal").value;
  ui.dinas     = document.getElementById("dinas").value;
  ui.pj        = document.getElementById("pj").value;
  ui.pp        = document.getElementById("pp").value;
  ui.diagnosis = document.getElementById("diagnosis").value;
  ui.laporan   = document.getElementById("laporan").value;
  ui.agama     = document.getElementById("agama").value;
  ui.jaminan   = document.getElementById("jaminan").value;
  ui.dpjp      = document.getElementById("dpjp").value;
  ui.dpjplain  = document.getElementById("dpjplain").value;
  ui.umur      = document.getElementById("umur").value;
  ui.harike    = document.getElementById("harike").value;

  var checked  = document.querySelectorAll(".multi:checked");
  ui.alatmedik = Array.from(checked).map(function(el) { return el.value; }).join(";");

  return ui;
}


// ── VALIDASI ────────────────────────────────────
function validasi(ui) {
  if (!ui.nomor || !ui.tanggal || !ui.dinas || !ui.pj || !ui.pasien || !ui.pp) {
    toast("Ada data wajib yang belum diisi (Tanggal, Shift, PJ, PP, Pasien).", "error");
    return false;
  }
  return true;
}


// ── CLEAR FORM ──────────────────────────────────
function clearForm() {
  ["nomor","tanggal","umur","harike","agama","jaminan",
   "dpjp","dpjplain","laporan","diagnosis","namahidden"].forEach(function(id) {
    document.getElementById(id).value = "";
  });
  ["dinas","pj","pp","pasien"].forEach(function(id) {
    document.getElementById(id).value = "";
  });
  document.querySelectorAll(".multi").forEach(function(cb) { cb.checked = false; });
}
</script>
</body>
