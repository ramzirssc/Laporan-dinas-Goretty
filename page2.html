<style>
  .p2-forms{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    height:calc(100vh - var(--topbar-h) - 32px);
  }
  .form-frame{
    display:flex;
    flex-direction:column;
    height:100%;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .form-frame-title{

    background:#1e3f62;color:#fff;
    font-family:var(--serif);font-size:13px;font-style:italic;font-weight:600;
    flex-shrink:0;
  }
  .form-frame iframe{
    flex:1;
    border:none;
    width:100%;
  }

  /* ═════ RESPONSIVE ═════ */
  /* Tablet portrait & mobile: stack ke bawah */
  @media (max-width:900px){
    .p2-forms{
      grid-template-columns:1fr;
      height:auto;
      gap:12px;
    }
    .form-frame{
      height:65vh;
    }
  }
  @media (max-width:480px){
    .form-frame{
      height:70vh;
    }
  }
</style>
