 .act-bar5{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 18px;

 @media(max-width:767px){

 }
</style>

<div class="act-bar5">
 <button class="btn btn-outline" id="p5update">&#9998;&nbsp; Perbarui Laporan</button>
 <button class="btn btn-success" id="p5simpan" hidden>&#10003;&nbsp; Simpan Laporan</button>
 <span class="act-hint5" id="p5hint">Mode lihat — klik Perbarui untuk mengedit</span>
</div>

<script>
var p5Nama='', p5Ready=false, p5Mode='lihat', p5Edit=false;

// Field IDENTITAS yang dikunci (abu-abu) saat membuat laporan baru.
var P5_LOCK = ['p5tanggal','p5dinas','p5namahidden','p5pasien',
               'p5umur','p5harike','p5agama','p5jaminan','p5dpjp','p5dpjplain'];
// Field yang BISA diubah saat membuat laporan baru.
var P5_NEW_EDIT = ['p5pj','p5pp','p5bed','p5diagnosis','p5laporan'];

function initP5(params){
 if(!p5Ready){
   document.getElementById('p5cari').addEventListener('click',p5BukaFromControls);
   document.getElementById('p5tambahdata').addEventListener('click',p5BukaFromControls);
   document.getElementById('p5simpan').addEventListener('click',p5Simpan);
   document.getElementById('p5update').addEventListener('click',p5Perbarui);
   // Ganti tanggal → reset nama & ambil daftar nama tanggal itu (1 call)
   document.getElementById('p5fTgl').addEventListener('change',function(){
     document.getElementById('p5fNama').value='';
     p5Open('', this.value, document.getElementById('p5fShift').value);
   });
   // Ganti nama / shift → muat paket (1 call). bed/diagnosis/alat ikut shift sebelumnya.
   document.getElementById('p5fNama').addEventListener('change',p5BukaFromControls);
   document.getElementById('p5fShift').addEventListener('change',p5BukaFromControls);
   p5Ready=true;
 }
 p5ApplyMaxTgl();

 if(params && params.viewNomor){
   p5SetSearchDefaults();
   p5LoadByNomor(params.viewNomor);
 }else if(params && params.isNew){
   var tgl=params.hariIni||p5OpsTgl();
   document.getElementById('p5fTgl').value=tgl;
   document.getElementById('p5fShift').value=params.shift||'Pagi';
   p5Open(params.namaPasien||'', tgl, params.shift||'Pagi');   // SATU call
 }else{
   p5SetSearchDefaults();
   p5Open('', document.getElementById('p5fTgl').value, document.getElementById('p5fShift').value);
 }
}

function p5SetSearchDefaults(){
 var t=document.getElementById('p5fTgl'); if(!t.value)t.value=p5OpsTgl();
 var s=document.getElementById('p5fShift'); if(!s.value)s.value='Pagi';
}

// Tanggal operasional (hari berganti pukul 07:00): default & batas atas laporan baru.
// Sumber server (var global OPS_TGL); fallback tanggal kalender browser.
function p5OpsTgl(){return (typeof opsTgl==='function')?opsTgl():ymd(new Date());}
function p5ApplyMaxTgl(){
 var ot=p5OpsTgl();
 var t=document.getElementById('p5fTgl');   if(t)t.max=ot;
 var t2=document.getElementById('p5tanggal'); if(t2)t2.max=ot;
}

function p5BukaFromControls(){
 p5Open(document.getElementById('p5fNama').value,
        document.getElementById('p5fTgl').value,
        document.getElementById('p5fShift').value);
}

// ── Inti: SATU panggilan server → daftar nama + data pasien + shift sebelumnya + existing ──
function p5Open(nama, tgl, shift){
 if(!tgl||!shift){p5KosongkanTampilan('Lengkapi tanggal & shift.');return;}
 loading(true);
 google.script.run
   .withSuccessHandler(function(raw){
     loading(false);
     var pkt;try{pkt=JSON.parse(raw);}catch(e){pkt=null;}
     if(!pkt){p5KosongkanTampilan('Gagal memuat data.');return;}
     p5FillNamaDropdown(pkt.namaList, nama);
     if(!nama){p5KosongkanTampilan('Pilih nama pasien.');return;}
     if(pkt.existing){
       p5Render(pkt.existing);                                  // laporan sudah ada → mode lihat
     }else if(String(tgl).substring(0,10) > p5OpsTgl()){
       // Belum boleh buat laporan baru bertanggal melebihi hari operasional (berganti 07:00).
       var maxT=fmtDMY(p5OpsTgl());
       p5KosongkanTampilan('Belum bisa membuat laporan tanggal '+fmtDMY(tgl)+'. '
         +'Hari operasional berganti pukul 07:00 — tanggal maksimal '+maxT+'.');
       toast('Belum pukul 07:00: laporan baru maksimal tanggal '+maxT+'.','err');
     }else{
       p5SetupBaru(nama, tgl, shift, pkt.dataPasien, pkt.sebelumnya); // baru, terisi shift sebelumnya
     }
   })
   .withFailureHandler(function(e){loading(false);errH(e);})
   .getPaketLaporan(nama, tgl, shift);
}

function p5FillNamaDropdown(list, selected){
 var sel=document.getElementById('p5fNama');
 sel.innerHTML='<option value="">— pilih —</option>';
 (list||[]).forEach(function(n){
   var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);
 });
 if(selected){
   var found=false;
   for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===selected){found=true;break;}}
   if(!found){var o=document.createElement('option');o.value=selected;o.textContent=selected;sel.appendChild(o);}
   sel.value=selected;
 }
}

function p5EnsureNamaOption(nama){
 if(!nama)return;
 var sel=document.getElementById('p5fNama');
 for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===nama){sel.value=nama;return;}}
 var o=document.createElement('option');o.value=nama;o.textContent=nama;sel.appendChild(o);sel.value=nama;
}

function p5LoadByNomor(nomor){
 loading(true);
 google.script.run
   .withSuccessHandler(function(raw){
     loading(false);
     if(!raw||raw===''){p5KosongkanTampilan('Data tidak ditemukan.');return;}
     try{p5Render(JSON.parse(raw));}catch(e){toast('Error render: '+e.message,'err');}
   })
   .withFailureHandler(function(e){loading(false);errH(e);})
   .caridata(nomor);
}

function p5Render(baris){
 var r=(Array.isArray(baris)&&baris.length>0&&Array.isArray(baris[0]))?baris[0]:baris;
 if(!r||!r.length){p5KosongkanTampilan('Data kosong.');return;}
 p5Nama=String(r[4]||'');
 var ids={p5nomor:r[0],p5dinas:r[2],p5pj:r[3],p5namahidden:r[4],
   p5pasien:r[4],p5pp:r[5],p5diagnosis:r[6],p5laporan:r[7],
   p5agama:r[10],p5jaminan:r[11],p5dpjp:r[12],p5dpjplain:r[13],
   p5umur:r[14],p5harike:r[15],p5bed:r[16]};
 Object.keys(ids).forEach(function(id){
   var el=document.getElementById(id);
   if(el)el.value=(ids[id]===null||ids[id]===undefined)?'':String(ids[id]);
 });
 var tgEl=document.getElementById('p5tanggal');
 if(tgEl){
   if(r[1]){try{var d=new Date(r[1]);
     tgEl.value=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
   }catch(e){tgEl.value='';}}else{tgEl.value='';}
 }
 document.querySelectorAll('.multi').forEach(function(cb){cb.checked=false;});
 if(r[8]&&String(r[8]).length>0){
   String(r[8]).split(';').forEach(function(id){
     var el=document.getElementById(String(id).trim());if(el)el.checked=true;
   });
 }
 if(r[1]&&tgEl)document.getElementById('p5fTgl').value=tgEl.value;
 document.getElementById('p5fShift').value=String(r[2]||'')||'Pagi';
 p5EnsureNamaOption(String(r[4]||''));
 p5Kunci();
}

// Mode LIHAT
function p5Kunci(){
 P5_LOCK.concat(P5_NEW_EDIT).forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=true;});
 document.querySelectorAll('.multi').forEach(function(cb){cb.disabled=true;});
 document.getElementById('p5pasien').hidden=true;
 document.getElementById('p5namahidden').hidden=false;
 if(p5Nama&&!document.getElementById('p5namahidden').value)
   document.getElementById('p5namahidden').value=p5Nama;
 document.getElementById('p5simpan').hidden=true;
 document.getElementById('p5update').hidden=false;
 p5ReqShow(false);
 p5SetHint('Mode lihat — klik Perbarui untuk mengedit');
 p5Edit=false;p5Mode='lihat';
}

// Mode EDIT laporan yang sudah ada (identitas tetap terkunci)
function p5Perbarui(){
 P5_LOCK.forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=true;});
 ['p5bed','p5diagnosis','p5laporan'].forEach(function(id){document.getElementById(id).disabled=false;});
 document.querySelectorAll('.multi').forEach(function(cb){cb.disabled=false;});
 document.getElementById('p5simpan').hidden=false;
 document.getElementById('p5update').hidden=true;
 p5ReqShow(false);
 p5SetHint('Mode edit — ubah data lalu klik Simpan');
 p5Edit=true;p5Mode='edit';
}

// Setup laporan BARU: identitas dikunci; bed/diagnosis/alat diisi dari shift sebelumnya.
function p5SetupBaru(nama,tgl,shift,dataPasien,sebelumnya){
 p5Bersih();
 p5Mode='baru';p5Edit=true;p5Nama=nama;
 document.getElementById('p5nomor').value='';
 document.getElementById('p5namahidden').value=nama;
 document.getElementById('p5namahidden').hidden=false;
 document.getElementById('p5pasien').hidden=true;
 document.getElementById('p5tanggal').value=tgl;
 document.getElementById('p5dinas').value=shift;
 if(dataPasien){
   var p=dataPasien;
   var map={p5umur:p[14],p5harike:p[15],p5agama:p[6],
            p5jaminan:p[8],p5dpjp:p[12],p5dpjplain:p[13],p5bed:p[11]};
   Object.keys(map).forEach(function(id){var el=document.getElementById(id);if(el)el.value=p5Fv(map[id]);});
 }
 // Shift sebelumnya: bed (timpa bed dari ws2), diagnosis, alat medik
 var sb=sebelumnya||{};
 if(sb.bed)document.getElementById('p5bed').value=sb.bed;
 if(sb.diagnosis)document.getElementById('p5diagnosis').value=sb.diagnosis;
 document.querySelectorAll('.multi').forEach(function(cb){cb.checked=false;});
 if(sb.alatmedik){
   String(sb.alatmedik).split(';').forEach(function(id){
     var cb=document.getElementById(String(id).trim());if(cb)cb.checked=true;
   });
 }
 // Kunci identitas, buka field yang boleh diisi
 P5_LOCK.forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=true;});
 P5_NEW_EDIT.forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=false;});
 document.querySelectorAll('.multi').forEach(function(cb){cb.disabled=false;});
 document.getElementById('p5simpan').hidden=false;
 document.getElementById('p5update').hidden=true;
 p5ReqShow(true);
 p5SetHint('Mode input baru — bed/diagnosis/alat mengikuti shift sebelumnya. Lengkapi PJ/PP lalu Simpan.');
}

function p5Simpan(){
 var ui=p5Kumpul();
 var wajib=ui.tanggal&&ui.dinas&&ui.pj&&ui.pp&&ui.pasien;
 if(!wajib || (p5Mode!=='baru' && !ui.nomor)){
   toast('Ada data wajib yang belum diisi.','err');return;
 }
 ui.isBaru=(p5Mode==='baru');
 p5Nama=ui.pasien;
 var btn=document.getElementById('p5simpan');
 btn.disabled=true;loading(true);
 google.script.run
   .withSuccessHandler(function(raw){
     loading(false);btn.disabled=false;
     var res;try{res=JSON.parse(raw);}catch(e){res=null;}
     if(!res||!res.ok){
       if(res&&res.alasan==='duplikat'){
         toast('Laporan untuk pasien+tanggal+shift ini sudah ada (No. '+res.nomor+'). Membuka laporan tersebut…','err');
         p5LoadByNomor(res.nomor);
       }else if(res&&res.alasan==='belum_waktunya'){
         toast('Belum pukul 07:00: laporan baru maksimal tanggal '+fmtDMY(res.opsTgl)+'.','err');
       }else if(res&&res.alasan==='tidak_ditemukan'){
         toast('Laporan tidak ditemukan untuk diedit.','err');
       }else if(res&&res.alasan==='sibuk'){
         toast('Server sibuk, coba simpan lagi sebentar.','err');
       }else{
         toast('Gagal menyimpan data.','err');
       }
       return;
     }
     document.getElementById('p5nomor').value=res.nomor;
     p5Kunci();
     var nhEl=document.getElementById('p5namahidden');
     if(nhEl&&p5Nama)nhEl.value=p5Nama;
     toast('Data berhasil disimpan (No. '+res.nomor+').','ok');
     loaded.p1=false;
   })
   .withFailureHandler(function(e){loading(false);btn.disabled=false;errH(e);})
   .simpandisheet(ui);
}

function p5Kumpul(){
 var ui={};
 ui.pasien=document.getElementById('p5namahidden').value||p5Nama;
 ui.nomor=parseInt(document.getElementById('p5nomor').value)||0;
 ui.tanggal=document.getElementById('p5tanggal').value;
 ui.dinas=document.getElementById('p5dinas').value;
 ui.pj=document.getElementById('p5pj').value;
 ui.pp=document.getElementById('p5pp').value;
 ui.diagnosis=document.getElementById('p5diagnosis').value;
 ui.laporan=document.getElementById('p5laporan').value;
 ui.agama=document.getElementById('p5agama').value;
 ui.jaminan=document.getElementById('p5jaminan').value;
 ui.dpjp=document.getElementById('p5dpjp').value;
 ui.dpjplain=document.getElementById('p5dpjplain').value;
 ui.umur=document.getElementById('p5umur').value;
 ui.harike=document.getElementById('p5harike').value;
 ui.bed=document.getElementById('p5bed').value;
 ui.alatmedik=Array.from(document.querySelectorAll('.multi:checked'))
   .map(function(e){return e.value;}).join(';');
 return ui;
}

function p5Bersih(){
 ['p5nomor','p5tanggal','p5umur','p5harike','p5agama','p5jaminan',
  'p5dpjp','p5dpjplain','p5laporan','p5diagnosis','p5namahidden'].forEach(function(id){
   var el=document.getElementById(id);if(el)el.value='';
 });
 ['p5dinas','p5pj','p5pp','p5pasien','p5bed'].forEach(function(id){
   var el=document.getElementById(id);if(el)el.value='';
 });
 document.querySelectorAll('.multi').forEach(function(cb){cb.checked=false;});
}

function p5KosongkanTampilan(hint){
 p5Bersih();
 P5_LOCK.concat(P5_NEW_EDIT).forEach(function(id){var el=document.getElementById(id);if(el)el.disabled=true;});
 document.querySelectorAll('.multi').forEach(function(cb){cb.disabled=true;});
 document.getElementById('p5simpan').hidden=true;
 document.getElementById('p5update').hidden=true;
 p5ReqShow(false);
 p5Edit=false;p5Mode='lihat';
 p5SetHint(hint||'');
}

function p5Fv(v){
 if(v instanceof Date)return v.getFullYear()+'-'+('0'+(v.getMonth()+1)).slice(-2)+'-'+('0'+v.getDate()).slice(-2);
 return String(v===null||v===undefined?'':v);
}
function p5ReqShow(v){
 document.querySelectorAll('.req').forEach(function(e){e.style.display=v?'inline':'none';});
}
function p5SetHint(t){var e=document.getElementById('p5hint');if(e)e.textContent=t;}
</script>
