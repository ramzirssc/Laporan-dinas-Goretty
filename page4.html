<style>

  .p4d-dd-item{padding:9px 12px;cursor:pointer;display:flex;align-items:baseline;

  .p4d-sep-bar{padding:4px 14px;background:var(--surface2);

  .p4d-fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;

  .p4d-fc{font-size:10px;font-weight:700;color:var(--muted);text-align:center}

  .p4d-chips{display:flex;flex-wrap:wrap;gap:3px;margin:4px 0 6px}

  .p4d-sep{border:none;border-top:1px solid var(--border-soft);margin:7px 0}
  .p4d-diag{font-size:11.5px;color:var(--text-soft);font-style:italic;margin-bottom:5px;line-height:1.5}

  .no-lap4{color:var(--muted);font-style:italic;font-size:12px}
  .p4d-hint{text-align:center;padding:40px;color:var(--muted);font-size:13px}
  .p4d-loader{text-align:center;padding:28px;color:var(--muted)}
  .p4d-empty{text-align:center;padding:40px;color:var(--muted)}
  .p4d-err{padding:20px;color:#c0392b;font-size:13px;background:#fdf0ee;

  .btn-print4{background:var(--surface);color:var(--slate);border:1px solid var(--slate);

  .p4d-print-title{display:none;margin-bottom:10pt;padding-bottom:6pt;border-bottom:1pt solid #c8d4e3}

  @media print{

  @media(max-width:1023px){.p4d-grid{grid-template-columns:repeat(2,1fr)}}

<div class="p4d-outer">
  <div class="p4d-top">
    <!-- ① SEARCH: cari dari SELURUH bank data -->
    <div class="p4d-search-bar">
      <span class="p4d-search-label">🔍 Cari pasien</span>
      <div class="p4d-search-inner">
        <input type="text" id="p4d-search"
          placeholder="Ketik nama (min. 2 huruf) → tampil semua riwayat historis"
          autocomplete="off" oninput="p4dSearchInput()">
        <button class="p4d-sx" id="p4d-sx" onclick="p4dSearchClear()">×</button>
        <div class="p4d-dd" id="p4d-dd"></div>
      </div>
      <button class="btn-print4" onclick="window.print()">🖨 Cetak PDF</button>
    </div>
    <!-- Bar nama terpilih dari search -->
    <div class="p4d-sel-bar" id="p4d-sel-bar">
      <span class="p4d-sel-txt" id="p4d-sel-txt"></span>
      <button class="p4d-sel-x" onclick="p4dSearchClear()">×</button>
    </div>
    <!-- Separator -->
    <div class="p4d-sep-bar">— atau pilih dari pasien hari ini (6 laporan terakhir) —</div>
    <!-- ② PASIEN HARI INI -->
    <div class="p4df">
      <div class="p4df-row">
        <div class="ff4"><label>Dari</label>
          <input type="date" id="p4d-dari" disabled style="width:130px"></div>
        <div class="ff4" style="justify-content:flex-end;padding-bottom:5px">
          <span style="font-size:12px;color:var(--muted)">s/d</span></div>
        <div class="ff4"><label>Sampai</label>
          <input type="date" id="p4d-sampai" disabled style="width:130px"></div>
        <div class="ff4" style="flex:3;min-width:160px"><label>Nama Pasien Hari Ini</label>
          <select id="p4d-nama" onchange="p4dOnNamaChange()">
            <option value="">— Semua Pasien Hari Ini —</option>
          </select></div>
        <div style="display:flex;gap:6px;align-items:flex-end">
          <button class="btn btn-primary" onclick="p4dTampilkan()"
            style="height:34px;min-height:44px">Tampilkan</button>
        </div>
      </div>
    </div>
    <div class="p4d-cnt" id="p4d-cnt">Memuat data pasien hari ini…</div>
  </div>

  <div class="p4d-scroll" id="p4d-scroll">
    <div class="p4d-print-title">
      <h1>Laporan Dinas — IPI Damianus RS St. Carolus</h1>
      <p id="p4d-print-sub"></p>
    </div>
    <div id="p4d-loader" class="p4d-loader" style="display:none">Memuat laporan…</div>
    <div id="p4d-content"><div class="p4d-hint">Memuat data…</div></div>
  </div>
</div>

<script>
var p4dMode = 'hari';   // 'hari' | 'search'
var p4dSearchRes = [];
var p4dTimer = null;

function initP4() {
  var today = new Date(), dua = new Date();
  dua.setDate(today.getDate()-2);
  document.getElementById('p4d-dari').value   = ymd(dua);
  document.getElementById('p4d-sampai').value = ymd(today);
  p4dLoadHariIni();
}

// ── Pasien hari ini ──────────────────────────────────
function p4dLoadHariIni() {
  p4dMode = 'hari';
  p4dShowLoader();
  google.script.run
    .withSuccessHandler(function(raw){
      loading(false);
      document.getElementById('p4d-loader').style.display = 'none';
      try {
        var obj = JSON.parse(raw);
        var pasienHariIni = obj.pasienHariIni || [];
        // Isi dropdown
        var sel = document.getElementById('p4d-nama'), cur = sel.value;
        sel.innerHTML = '<option value="">— Semua Pasien Hari Ini —</option>';
        pasienHariIni.forEach(function(n){
          var o = document.createElement('option');
          o.value = n; o.textContent = n; if(n===cur) o.selected=true; sel.appendChild(o);
        });
        p4dRenderObjek(obj.laporan||{}, pasienHariIni, '6 laporan terakhir per pasien');
      } catch(e) { p4dShowErr(String(e)); }
    })
    .withFailureHandler(function(e){ loading(false); p4dShowErr(e&&e.message?e.message:String(e)); })
    .getDataPage4('','','',false);
}

function p4dOnNamaChange() { p4dTampilkan(); }

function p4dTampilkan() {
  if(p4dMode === 'search') p4dSearchClear();
  var nama = document.getElementById('p4d-nama').value;
  p4dMode = 'hari';
  p4dShowLoader();
  google.script.run
    .withSuccessHandler(function(raw){
      loading(false);
      document.getElementById('p4d-loader').style.display = 'none';
      try {
        var obj = JSON.parse(raw);
        var pasienHariIni = obj.pasienHariIni || [];
        var targets = nama ? [nama] : pasienHariIni;
        p4dRenderObjek(obj.laporan||{}, targets, '6 laporan terakhir');
      } catch(e) { p4dShowErr(String(e)); }
    })
    .withFailureHandler(function(e){ loading(false); p4dShowErr(e&&e.message?e.message:String(e)); })
    .getDataPage4(nama,'','',false);
}

function p4dRenderObjek(laporan, targets, label) {
  var totalLap=0, pasienDgLap=0;
  targets.forEach(function(n){ var l=(laporan[n]||[]).length; totalLap+=l; if(l>0)pasienDgLap++; });
  document.getElementById('p4d-cnt').textContent =
    totalLap+' laporan · '+pasienDgLap+'/'+targets.length+' pasien · '+label;
  if(!totalLap){
    document.getElementById('p4d-content').innerHTML='<div class="p4d-empty">📭 Tidak ada laporan</div>';
    return;
  }
  var html='';
  targets.forEach(function(n){ var l=laporan[n]||[]; if(l.length) html+=p4dBuildSeksi(n,l); });
  document.getElementById('p4d-content').innerHTML=html||'<div class="p4d-empty">Tidak ada data</div>';
  document.getElementById('p4d-print-sub').textContent=
    (targets.length===1?targets[0]:'Semua pasien')+' · '+label+' · Dicetak: '+fmtDMY(ymd(new Date()));
}

// ── Search dari seluruh bank data ───────────────────
function p4dSearchInput() {
  var q = document.getElementById('p4d-search').value.trim();
  document.getElementById('p4d-sx').classList.toggle('show', q.length>0);
  if(q.length<2){ document.getElementById('p4d-dd').classList.remove('open'); clearTimeout(p4dTimer); return; }
  clearTimeout(p4dTimer);
  p4dTimer = setTimeout(function(){ p4dDoSearch(q); }, 350);
}

function p4dDoSearch(q) {
  var dd = document.getElementById('p4d-dd');
  dd.innerHTML='<div class="p4d-dd-loading">Mencari di seluruh data…</div>';
  dd.classList.add('open');
  google.script.run
    .withSuccessHandler(function(raw){
      try {
        p4dSearchRes = JSON.parse(raw);
        if(!p4dSearchRes.length){
          dd.innerHTML='<div class="p4d-dd-empty">Tidak ada pasien "'+esc(q)+'"</div>'; return;
        }
        var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        var html='<div class="p4d-dd-hint">'+p4dSearchRes.length+' nama — klik untuk lihat seluruh riwayat</div>';
        p4dSearchRes.forEach(function(item,i){
          html+='<div class="p4d-dd-item" onclick="p4dPilih('+i+')">'
            +'<span class="p4d-dd-nama">'+esc(item.nama).replace(re,'<mark>$1</mark>')+'</span>'
            +'<span class="p4d-dd-meta">'+item.jumlah+' laporan · terakhir '+esc(item.tglTerakhir)+'</span>'
            +'</div>';
        });
        dd.innerHTML=html;
      } catch(e){ dd.innerHTML='<div class="p4d-dd-empty">Error: '+esc(String(e))+'</div>'; }
    })
    .withFailureHandler(function(e){
      dd.innerHTML='<div class="p4d-dd-empty">Gagal: '+esc(e&&e.message?e.message:String(e))+'</div>';
    })
    .cariSemuaNamaPasien(q);
}

function p4dPilih(i) {
  var item = p4dSearchRes[i]; if(!item) return;
  var nama = item.nama;
  document.getElementById('p4d-dd').classList.remove('open');
  document.getElementById('p4d-search').value = nama;
  document.getElementById('p4d-sx').classList.add('show');
  document.getElementById('p4d-sel-txt').textContent = nama+' — seluruh riwayat ('+item.jumlah+' laporan)';
  document.getElementById('p4d-sel-bar').classList.add('show');
  p4dMode = 'search';
  // Panggil getAllLaporanPasien — baca SEMUA baris, tanpa batas tanggal/row
  document.getElementById('p4d-cnt').textContent='Memuat seluruh riwayat '+nama+'…';
  document.getElementById('p4d-loader').style.display='block';
  document.getElementById('p4d-content').innerHTML='';
  loading(true);
  google.script.run
    .withSuccessHandler(function(raw){
      loading(false);
      document.getElementById('p4d-loader').style.display='none';
      try {
        var laps=JSON.parse(raw);
        if(!laps.length){
          document.getElementById('p4d-cnt').textContent='Tidak ada laporan untuk '+nama;
          document.getElementById('p4d-content').innerHTML='<div class="p4d-empty">📭 Tidak ada laporan</div>';
          return;
        }
        document.getElementById('p4d-cnt').textContent=laps.length+' laporan · seluruh riwayat · '+nama;
        document.getElementById('p4d-print-sub').textContent=
          nama+' · Seluruh riwayat · Dicetak: '+fmtDMY(ymd(new Date()));
        document.getElementById('p4d-content').innerHTML=p4dBuildSeksi(nama,laps);
      } catch(e){ p4dShowErr(String(e)); }
    })
    .withFailureHandler(function(e){ loading(false); p4dShowErr(e&&e.message?e.message:String(e)); })
    .getAllLaporanPasien(nama);
}

function p4dSearchClear() {
  p4dSearchRes=[];
  document.getElementById('p4d-search').value='';
  document.getElementById('p4d-sx').classList.remove('show');
  document.getElementById('p4d-dd').classList.remove('open');
  document.getElementById('p4d-sel-bar').classList.remove('show');
  if(p4dMode==='search'){ p4dMode='hari'; p4dLoadHariIni(); }
}

document.addEventListener('click',function(e){
  var inner=document.querySelector('.p4d-search-inner');
  if(inner&&!inner.contains(e.target)) document.getElementById('p4d-dd').classList.remove('open');
});

// ── Helpers ──────────────────────────────────────────
function p4dShowLoader(){
  document.getElementById('p4d-cnt').textContent='Memuat…';
  document.getElementById('p4d-loader').style.display='block';
  document.getElementById('p4d-content').innerHTML='';
  loading(true);
}
function p4dShowErr(msg){
  document.getElementById('p4d-cnt').textContent='Error';
  document.getElementById('p4d-loader').style.display='none';
  document.getElementById('p4d-content').innerHTML='<div class="p4d-err">⚠ '+esc(msg)+'</div>';
}

function p4dBuildSeksi(namaP, laps) {
  var html='<div class="p4d-patient-sec">'
    +'<div class="p4d-patient-hdr">'
      +'<span class="p4d-pnm">'+esc(namaP)+'</span>'
      +'<span class="p4d-pcnt">'+laps.length+' laporan</span>'
    +'</div><div class="p4d-grid">';
  laps.forEach(function(r){
    var sc=(r.shift||'').toLowerCase();
    var cls='p4d-'+(sc==='pagi'?'pagi':sc==='sore'?'sore':'malam');
    var alat=(r.alatmedik||'').split(';').filter(Boolean);
    var alatH=alat.length?'<div class="p4d-chips">'+alat.map(function(a){return'<span class="p4d-chip">'+esc(a)+'</span>';}).join('')+'</div>':'';
    html+='<div class="p4d-card '+cls+'">'
      +'<div class="p4d-ch"><div class="p4d-ch-left">'
        +'<span class="p4d-shift">'+esc(r.shift||'')+'</span>'
        +'<span class="p4d-date">'+esc(r.tanggal||'')+'</span>'
      +'</div><span class="sh-no" onclick="goToLap('+Number(r.nomor||0)+')">#'+esc(String(r.nomor||''))+'</span></div>'
      +'<div class="p4d-cb">'
        +p4dFrow3('Bed',r.bed,'Hari ke',r.harike,'Jaminan',r.jaminan)
        +p4dFrow2('Umur',r.umur,'Agama',r.agama)
        +p4dFrow1('DPJP',r.dpjp)
        +p4dFrow1('Konsulen',r.dpjplain)
        +p4dFrow1('PJ',r.pj)
        +p4dFrow1('PP',r.pp)
        +alatH+'<hr class="p4d-sep">'
        +(r.diagnosis?'<div class="p4d-diag">'+esc(String(r.diagnosis))+'</div>':'')
        +(r.laporan?'<div class="p4d-lap">'+esc(String(r.laporan))+'</div>':'<span class="no-lap4">Isi laporan kosong</span>')
      +'</div></div>';
  });
  return html+'</div></div>';
}
// Satu field: label + titik-dua + nilai dalam grid 3-kolom internal
function fi(lbl,val){
  if(!val&&val!==0) return'<div class="p4d-fi"></div>';
  return'<div class="p4d-fi">'
    +'<span class="p4d-fl">'+lbl+'</span>'
    +'<span class="p4d-fc">:</span>'
    +'<span class="p4d-fv">'+esc(String(val))+'</span>'
    +'</div>';
}
// Baris 1 field (DPJP, Konsulen, PJ, PP)
function p4dFrow1(l,v){
  if(!v&&v!==0)return'';
  return'<div class="p4d-frow col1">'+fi(l,v)+'</div>';
}
// Baris 2 field: Umur span 2 kolom, Agama di kolom 3 (sejajar Jaminan)
function p4dFrow2(l1,v1,l2,v2){
  if(!v1&&!v2&&v1!==0&&v2!==0)return'';
  var umur=v1?'<div class="p4d-fi" style="grid-column:span 2">'
    +'<span class="p4d-fl">'+l1+'</span>'
    +'<span class="p4d-fc">:</span>'
    +'<span class="p4d-fv">'+esc(String(v1))+'</span>'
    +'</div>':'<div style="grid-column:span 2"></div>';
  return'<div class="p4d-frow col3">'+umur+fi(l2,v2)+'</div>';
}
// Baris 3 field (Bed + Hari ke + Jaminan)
function p4dFrow3(l1,v1,l2,v2,l3,v3){
  if(!v1&&!v2&&!v3&&v1!==0&&v2!==0&&v3!==0)return'';
  return'<div class="p4d-frow col3">'+fi(l1,v1)+fi(l2,v2)+fi(l3,v3)+'</div>';
}
function p4dRow(lbl,val){
  if(!val&&val!==0)return'';
  return'<div class="p4d-frow col1">'+fi(lbl,val)+'</div>';
}
function goToLap(n){gotoPage('p5',{viewNomor:n});}
</script>
